<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Controle de Plantas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1> Controle de Plantas</h1>
    <form id="plantForm">
      <label for="nome">Nome da planta:</label>
      <input type="text" id="nome" required>

      <label for="tipo">Tipo:</label>
      <input type="text" id="tipo" required>

      <label for="frequencia">Frequência de rega (dias):</label>
      <input type="number" id="frequencia" min="1" required>

      <button type="submit">Adicionar Planta</button>
    </form>

    <h2>Lista de Plantas</h2>
    <ul id="listaPlantas"></ul>
  </div>

  <h1>s</h1>

  <script src="script.js"></script>
</body>
</html>
